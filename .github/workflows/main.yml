name: 🚀 Deploy Portfólio (React + PHP API)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🎉 Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      # 2️⃣ Node para build do React
      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3️⃣ Instalar dependências e buildar React
      - name: 📦 Build React (Vite)
        working-directory: ./my-portifolio
        run: |
          npm install
          npm run build

      # 4️⃣ Deploy do FRONTEND (React)
      - name: 🌐 Deploy Frontend (React)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_SENHA }}
          local-dir: ./my-portifolio/dist/
          server-dir: /public_html/joaoroblez/
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**

      # 5️⃣ Deploy do BACKEND (PHP API)
      - name: 🐘 Deploy Backend (PHP API)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_SENHA }}
          local-dir: ./Portifolio-Api/
          server-dir: /public_html/joaoroblez/api/
          exclude: |
            **/.git*
            **/.github/**
            **/.env
            **/node_modules/**
            **/storage/**
